version: '3.8'
name: vellum-hub

networks:
  vellum-network:
    driver: bridge

x-otel-java-env: &otel-java-env
  OTEL_RESOURCE_ATTRIBUTES: service.namespace=vellumhub,deployment.environment=local
  OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  OTEL_METRICS_EXPORTER: none
  OTEL_LOGS_EXPORTER: none
  OTEL_TRACES_SAMPLER: parentbased_traceidratio
  OTEL_TRACES_SAMPLER_ARG: "1.0"

services:

  # GATEWAY LAYER
  gateway-service:
    build: ./services/gateway-service
    container_name: gateway-service
    restart: on-failure
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      <<: *otel-java-env
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      JAVA_TOOL_OPTIONS: "-Xms256m -Xmx512m -javaagent:/app/opentelemetry-javaagent.jar"
      OTEL_SERVICE_NAME: gateway-service
      SPRING_DATA_REDIS_HOST: redis-gateway
      SPRING_DATA_REDIS_PORT: 6379
      USER_SERVICE_URL: http://user-service:8080
      CATALOG_SERVICE_URL: http://catalog-service:8080
      ENGAGEMENT_SERVICE_URL: http://engagement-service:8080
      RECOMMENDATION_SERVICE_URL: http://recommendation-service:8080
      JWT_KEY: ${JWT_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      VELLUM_ENVIRONMENT: local
    networks:
      - vellum-network
    depends_on:
      redis-gateway:
        condition: service_healthy
      user-service:
        condition: service_started
      catalog-service:
        condition: service_started
      engagement-service:
        condition: service_started
      recommendation-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s

  redis-gateway:
    image: redis:7-alpine
    container_name: redis-gateway
    restart: unless-stopped
    networks:
      - vellum-network
    volumes:
      - redis_gateway_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # DATABASES LAYER
  postgres-catalog:
    build: ./infra/docker/postgres-catalog
    container_name: postgres-catalog
    restart: unless-stopped
    shm_size: 256mb
    command: postgres -c shared_buffers=256MB -c max_connections=200 -c work_mem=16MB
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: catalog_db
    volumes:
      - postgres_catalog_data:/var/lib/postgresql/data
    networks:
      - vellum-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d catalog_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-engagement:
    image: postgres:15-alpine
    container_name: postgres-engagement
    restart: unless-stopped
    shm_size: 256mb
    command: postgres -c shared_buffers=256MB -c max_connections=200 -c work_mem=16MB
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: engagement_db
    volumes:
      - postgres_engagement_data:/var/lib/postgresql/data
    networks:
      - vellum-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d engagement_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-user:
    build: ./infra/docker/postgres-user
    container_name: postgres-user
    restart: unless-stopped
    shm_size: 256mb
    command: postgres -c shared_buffers=256MB -c max_connections=200 -c work_mem=16MB
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: user_db
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
    networks:
      - vellum-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d user_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-recommendation:
    build: ./infra/docker/postgres-recommendation
    container_name: postgres-recommendation
    restart: unless-stopped
    shm_size: 256mb
    command: postgres -c shared_buffers=256MB -c max_connections=200 -c work_mem=16MB
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: recommendation_db
    volumes:
      - postgres_recommendation_data:/var/lib/postgresql/data
    networks:
      - vellum-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d recommendation_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # MESSAGING LAYER
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - vellum-network
    healthcheck:
      test: echo srvr | nc localhost 2181 || exit 1
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - vellum-network
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_ZOOKEEPER_CONNECT_TIMEOUT_MS: 60000
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xmx512M -Xms512M"
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: nc -z localhost 29092 || exit 1
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  kafka-ui:
    image: provectuslabs/kafka-ui@sha256:8f2ff02d64b0a7a2b71b6b3b3148b85f66d00ec20ad40c30bdcd415d46d31818
    container_name: kafka-ui
    restart: unless-stopped
    ports:
      - "8090:8080"
    networks:
      - vellum-network
    environment:
      KAFKA_CLUSTERS_0_NAME: vellumhub-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      DYNAMIC_CONFIG_ENABLED: 'true'
    depends_on:
      kafka:
        condition: service_healthy

  # OBSERVABILITY LAYER
  prometheus:
    image: prom/prometheus:v3.12.0
    container_name: prometheus
    restart: unless-stopped
    profiles:
      - observability
    ports:
      - "9090:9090"
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --web.console.templates=/etc/prometheus/consoles
      - --web.enable-lifecycle
    networks:
      - vellum-network

  grafana:
    image: grafana/grafana:13.0.1
    container_name: grafana
    restart: unless-stopped
    profiles:
      - observability
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - vellum-network
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      tempo:
        condition: service_started

  loki:
    image: grafana/loki:3.7.2
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./infra/observability/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    command:
      - -config.file=/etc/loki/loki.yml
    networks:
      - vellum-network

  tempo:
    image: grafana/tempo:2.10.5
    container_name: tempo
    restart: unless-stopped
    ports:
      - "3200:3200"
    volumes:
      - ./infra/observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    command:
      - -config.file=/etc/tempo/tempo.yml
    networks:
      - vellum-network

  alloy:
    image: grafana/alloy:v1.16.1
    container_name: alloy
    restart: unless-stopped
    ports:
      - "12345:12345"
    volumes:
      - ./infra/observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy_data:/var/lib/alloy/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    networks:
      - vellum-network
    depends_on:
      loki:
        condition: service_started
      tempo:
        condition: service_started

  # MICROSERVICES LAYER
  catalog-service:
    build:
      context: .
      dockerfile: services/catalog-service/Dockerfile
    container_name: catalog-service
    restart: on-failure
    env_file: .env
    environment:
      <<: *otel-java-env
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      JAVA_TOOL_OPTIONS: "-Xms256m -Xmx512m -javaagent:/app/opentelemetry-javaagent.jar"
      OTEL_SERVICE_NAME: catalog-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-catalog:5432/catalog_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_KEY: ${JWT_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      VELLUM_ENVIRONMENT: local
    networks:
      - vellum-network
    depends_on:
      postgres-catalog:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  engagement-service:
    build:
      context: .
      dockerfile: services/engagement-service/Dockerfile
    container_name: engagement-service
    restart: on-failure
    env_file: .env
    environment:
      <<: *otel-java-env
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      JAVA_TOOL_OPTIONS: "-Xms256m -Xmx512m -javaagent:/app/opentelemetry-javaagent.jar"
      OTEL_SERVICE_NAME: engagement-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-engagement:5432/engagement_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_KEY: ${JWT_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      VELLUM_ENVIRONMENT: local
    networks:
      - vellum-network
    depends_on:
      postgres-engagement:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: user-service
    restart: on-failure
    env_file: .env
    environment:
      <<: *otel-java-env
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      JAVA_TOOL_OPTIONS: "-Xms256m -Xmx512m -javaagent:/app/opentelemetry-javaagent.jar"
      OTEL_SERVICE_NAME: user-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-user:5432/user_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_KEY: ${JWT_KEY}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      VELLUM_ENVIRONMENT: local
    networks:
      - vellum-network
    depends_on:
      postgres-user:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  recommendation-service:
    build:
      context: .
      dockerfile: services/recommendation-service/Dockerfile
    container_name: recommendation-service
    restart: on-failure
    env_file: .env
    environment:
      <<: *otel-java-env
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
      JAVA_TOOL_OPTIONS: "-Xms256m -Xmx512m -javaagent:/app/opentelemetry-javaagent.jar"
      OTEL_SERVICE_NAME: recommendation-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-recommendation:5432/recommendation_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_KEY: ${JWT_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      VELLUM_ENVIRONMENT: local
    networks:
      - vellum-network
    depends_on:
      postgres-recommendation:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres_catalog_data:
  postgres_engagement_data:
  postgres_user_data:
  postgres_recommendation_data:
  redis_gateway_data:
  kafka_data:
  zookeeper_data:
  zookeeper_log:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:
  alloy_data:
