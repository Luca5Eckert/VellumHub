apiVersion: 1

providers:
  - name: VellumHub
    orgId: 1
    folder: VellumHub
    folderUid: vellumhub
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboards/json
      foldersFromFilesStructure: false
