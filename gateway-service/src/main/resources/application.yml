server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      routes:
        - id: auth
          uri: ${USER_SERVICE_URL:http://user-service:8080}
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=0
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipKeyResolver}"
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10

        - id: users
          uri: ${USER_SERVICE_URL:http://user-service:8080}
          predicates:
            - Path=/api/v1/users/**
          filters:
            - StripPrefix=0
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20

        - id: catalogs
          uri: ${CATALOG_SERVICE_URL:http://catalog-service:8080}
          predicates:
            - Path=/api/v1/catalog/**
          filters:
            - StripPrefix=0
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 30
                redis-rate-limiter.burstCapacity: 60

        - id: engagements
          uri: ${ENGAGEMENT_SERVICE_URL:http://engagement-service:8080}
          predicates:
            - Path=/api/v1/engagement/**
          filters:
            - StripPrefix=0
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 30
                redis-rate-limiter.burstCapacity: 60

        - id: recommendations
          uri: ${RECOMMENDATION_SERVICE_URL:http://recommendation-service:8080}
          predicates:
            - Path=/api/v1/recommendation/**
          filters:
            - StripPrefix=0
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40

  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: ${JWT_KEY:sua_chave_secreta_muito_longa_de_32_caracteres}

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      connect-timeout: 2s