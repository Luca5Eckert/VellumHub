# Application
spring.application.name=engagement-service
spring.profiles.active=local

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

# Kafka - Topics
kafka.group-id=engagement-service
kafka.topics.created-book=created-book
kafka.topics.updated-book=updated-book
kafka.topics.deleted-book=deleted-book

# Kafka - Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=true
spring.kafka.producer.properties.spring.json.type.mapping=\
  create_rating_event:com.vellumhub.engagement_service.module.rating.domain.event.CreatedRatingEvent,\
  reaction_changed_event:com.vellumhub.engagement_service.module.reaction.domain.event.ReactionChangedEvent

# Kafka - Consumer
spring.kafka.consumer.group-id=engagement-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.type.mapping=\
  create_book_event:com.vellumhub.engagement_service.module.book_snapshot.presentation.event.CreateBookEvent,\
  delete_book_event:com.vellumhub.engagement_service.module.book_snapshot.presentation.event.DeleteBookEvent,\
  reaction_changed_event:com.vellumhub.engagement_service.module.reaction.domain.event.ReactionChangedEvent, \
  update_book_progress_event:com.vellumhub.engagement_service.module.reading_session_entry.infrastructure.kafka.event.UpdateBookProgressEvent, \
  create_book_progress_event:com.vellumhub.engagement_service.module.reading_session_entry.infrastructure.kafka.event.CreateBookProgressEvent

# Kafka - Listener
spring.kafka.listener.ack-mode=record
spring.kafka.listener.missing-topics-fatal=false
spring.kafka.listener.concurrency=3

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.health.kafka.enabled=true
management.prometheus.metrics.export.enabled=true
management.metrics.tags.service=${spring.application.name}
management.info.env.enabled=true

# Loggings
logging.structured.format.console=logstash
logging.structured.json.add.service=${spring.application.name}
logging.structured.json.add.environment=${VELLUM_ENVIRONMENT:local}
logging.structured.json.rename.logger_name=logger
logging.level.root=INFO
logging.level.com.vellumhub.engagement_service=DEBUG
logging.level.org.apache.kafka=WARN
logging.level.org.springframework.kafka=WARN
