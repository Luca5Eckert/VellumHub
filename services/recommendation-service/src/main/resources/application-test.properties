# Test Database Configuration (H2 in-memory)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.flyway.enabled=false

# Logging
logging.level.root=WARN
logging.level.com.vellumhub=INFO

# Disable unnecessary services for tests
spring.cloud.discovery.enabled=false
spring.cloud.loadbalancer.enabled=false

# Kafka Configuration for Tests
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=recommendation-group-test

# Disable Kafka health check for tests
management.health.kafka.enabled=false

