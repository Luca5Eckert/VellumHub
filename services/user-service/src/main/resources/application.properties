spring.application.name=user-service

# CORS Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

google.client.id=${GOOGLE_CLIENT_ID:your-google-client-id}

spring.profiles.active=local

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.health.kafka.enabled=true
management.prometheus.metrics.export.enabled=true
management.metrics.tags.service=${spring.application.name}

logging.structured.format.console=logstash
logging.structured.json.add.service=${spring.application.name}
logging.structured.json.add.environment=${VELLUM_ENVIRONMENT:local}
logging.structured.json.rename.logger_name=logger

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.trusted.packages=*

spring.kafka.producer.properties.spring.json.type.mapping =\
  created_user_preference:com.vellumhub.kafka.contracts.user.CreateUserPreferenceEvent

spring.kafka.producer.properties.spring.json.add.type.headers =true
